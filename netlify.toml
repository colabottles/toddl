[build]
  publish = "_site"
  command = "eleventy"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/font-woff"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/font-woff2"

[[headers]]
  for = "/*.ttf"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/font-ttf"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = '''
    max-age=31536000,
    no-cache,
    no-store,
    must-revalidate'''

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' unsafe-inline'; form-action 'self'; script-src 'self'; connect-src 'self'; img-src 'self' data: https:; base-uri 'self'; style-src 'self' 'unsafe-inline';"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[plugins]]
  package = "netlify-plugin-cloudinary"

[plugins.inputs]
  cloudName = "colabottles"
  deliveryType = "upload"

[[plugins]]
  package = "@netlify/plugin-emails"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/followers"
  [headers.values]
    X-Robots-Tag = "noindex"

[functions."twitch"]
  timeout = 30
